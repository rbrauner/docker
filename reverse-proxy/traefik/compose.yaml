services:
    traefik:
        container_name: traefik
        image: traefik:3
        restart: unless-stopped
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TIMEZONE:-Europe/Warsaw}"
        ports:
            - ${TRAEFIK_PORT_80:-80}:80
            - ${TRAEFIK_PORT_443_TCP:-443}:443/tcp
            - ${TRAEFIK_PORT_443_UDP:-443}:443/udp
        hostname: "${DOMAIN:-traefik.localhost}"
        networks:
            shared-network:
            shared-network-internal:
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - shared-home:/home/${APP_USER:-app}
            - ./config/traefik.yaml:/etc/traefik/traefik.yaml:ro
            - ./config/dynamic.yaml:/etc/traefik/dynamic.yaml:ro
            - ./certs:/etc/certs:ro
        labels:
            traefik.enable: "true"
            # Redirect http to https
            traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: "https"
            traefik.http.middlewares.redirect-to-https.redirectscheme.permanent: "true"
            # traefik.localhost
            traefik.http.routers.traefik.rule: "Host(`${DOMAIN:-traefik.localhost}`)"
            traefik.http.routers.traefik.service: "api@internal"

networks:
    shared-network:
        name: ${SHARED_NETWORK_NAME:-shared-network}
        external: true
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
