global:
    sendAnonymousUsage: false

api:
    dashboard: true
    insecure: true

providers:
    docker:
        endpoint: "unix:///var/run/docker.sock"
        watch: true
        exposedByDefault: false

    file:
        filename: /etc/traefik/dynamic.yaml
        watch: true

entryPoints:
    traefik:
        address: ":8999"
    http:
        address: ":80"
    https:
        address: ":443"
