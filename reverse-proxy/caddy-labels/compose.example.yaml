services:
    whoami:
        container_name: whoami
        image: traefik/whoami
        restart: unless-stopped
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TIMEZONE:-Europe/Warsaw}"
        hostname: "${DOMAIN:-whoami.localhost}"
        networks:
            shared-network-internal:
            # shared-network:
        volumes:
            - shared-home:/home/${APP_USER:-app}
        labels:
            caddy: "${DOMAIN:-whoami.localhost}"
            caddy.reverse_proxy: "{{upstreams http}}"

networks:
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true
    # shared-network:
    #     name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network}
    #     external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
