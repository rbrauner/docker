name: postgres16

services:
    postgres16:
        container_name: postgres16
        image: postgres:16-trixie
        restart: unless-stopped
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TIMEZONE:-Europe/Warsaw}"
            POSTGRES_USER: "${DB_USER:-root}"
            POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
            POSTGRES_DB: "${DB_NAME:-default}"
        ports:
            - ${DB_PORT:-5516}:5432
        networks:
            shared-network-internal:
        volumes:
            - shared-home:/home/${APP_USER:-app}
            - postgres16:/var/lib/postgresql/16/docker
            - ./bin/backup.sh:/bin/backup.sh:ro
            - ${BACKUP_DIR:-${HOME}/data/backups/docker/postgres16}:/backup
#        labels:
#             ofelia.enabled: "true"
#             ofelia.job-exec.postgres16.command: "/bin/backup.sh"
#             ofelia.job-exec.postgres16.schedule: "${BACKUP_CRON_EXPRESSION:-0 9,15,17,21 * * *}"
        tty: true

networks:
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
    postgres16:
        name: postgres16
