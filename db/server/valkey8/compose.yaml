name: valkey8

services:
    valkey8:
        container_name: valkey8
        image: valkey/valkey:8-trixie
        restart: unless-stopped
        command: valkey-server --save 60 1 --loglevel warning --requirepass secret
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TIMEZONE:-Europe/Warsaw}"
        ports:
            - ${VALKEY_PORT:-6208}:6379
        networks:
            shared-network-internal:
        volumes:
            - shared-home:/home/${APP_USER:-app}
            - valkey8-data:/data
        tty: true

networks:
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
    valkey8-data:
        name: valkey8-data
