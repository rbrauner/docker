name: percona8

services:
    percona8:
        container_name: percona8
        image: percona/percona-server:8
        restart: unless-stopped
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TZ:-Europe/Warsaw}"
            MYSQL_DATABASE: "${DB_NAME:-default}"
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret}"
        ports:
            - ${DB_PORT:-3318}:3306
        networks:
            shared-network-internal:
        volumes:
            - shared-home:/home/${APP_USER:-app}
            - percona8-data:/var/lib/mysql
            - percona8-conf:/etc/mysql
            - ./bin/backup.sh:/bin/backup.sh:ro
            - ${BACKUP_DIR:-${HOME}/data/backups/docker/percona8}:/backup
#        labels:
#             ofelia.enabled: "true"
#             ofelia.job-exec.percona8.command: "/bin/backup.sh"
#             ofelia.job-exec.percona8.schedule: "${BACKUP_CRON_EXPRESSION:-0 9,15,17,21 * * *}"
        tty: true

networks:
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
    percona8-data:
        name: percona8-data
    percona8-conf:
        name: percona8-conf
