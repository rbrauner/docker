name: mariadb11

services:
    mariadb11:
        container_name: mariadb11
        image: mariadb:11
        restart: unless-stopped
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TZ:-Europe/Warsaw}"
            MYSQL_DATABASE: "${DB_NAME:-default}"
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret}"
        ports:
            - ${DB_PORT:-3311}:3306
        networks:
            shared-network-internal:
        volumes:
            - shared-home:/home/${APP_USER:-app}
            - mariadb11-data:/var/lib/mysql
            - mariadb11-conf:/etc/mysql
            - ./bin/backup.sh:/bin/backup.sh:ro
            - ${BACKUP_DIR:-${HOME}/data/backups/docker/mariadb11}:/backup
#        labels:
#             ofelia.enabled: "true"
#             ofelia.job-exec.mariadb11.command: "/bin/backup.sh"
#             ofelia.job-exec.mariadb11.schedule: "${BACKUP_CRON_EXPRESSION:-0 9,15,17,21 * * *}"
        tty: true

networks:
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
    mariadb11-data:
        name: mariadb11-data
    mariadb11-conf:
        name: mariadb11-conf
