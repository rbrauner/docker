name: mariadb13

services:
    mariadb13:
        container_name: mariadb13
        image: mariadb:13
        restart: unless-stopped
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TIMEZONE:-Europe/Warsaw}"
            MYSQL_DATABASE: "${DB_NAME:-default}"
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret}"
        ports:
            - ${DB_PORT:-3313}:3306
        networks:
            shared-network-internal:
        volumes:
            - shared-home:/home/${APP_USER:-app}
            - mariadb13-data:/var/lib/mysql
            - mariadb13-conf:/etc/mysql
            - ./bin/backup.sh:/bin/backup.sh:ro
            - ${BACKUP_DIR:-${HOME}/data/backups/docker/mariadb13}:/backup
#        labels:
#             ofelia.enabled: "true"
#             ofelia.job-exec.mariadb13.command: "/bin/backup.sh"
#             ofelia.job-exec.mariadb13.schedule: "${BACKUP_CRON_EXPRESSION:-0 9,15,17,21 * * *}"
        tty: true

networks:
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
    mariadb13-data:
        name: mariadb13-data
    mariadb13-conf:
        name: mariadb13-conf
