name: mysql9

services:
    mysql9:
        container_name: mysql9
        image: mysql:9
        restart: unless-stopped
        # user: "${UID:-1000}:${GID:-1000}"
        environment:
            TZ: "${TZ:-Europe/Warsaw}"
            MYSQL_DATABASE: "${DB_NAME:-default}"
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret}"
        ports:
            - ${DB_PORT:-3309}:3306
        networks:
            shared-network-internal:
        volumes:
            - shared-home:/home/${APP_USER:-app}
            - mysql9-data:/var/lib/mysql
            - mysql9-conf:/etc/mysql
            - ./bin/backup.sh:/bin/backup.sh:ro
            - ${BACKUP_DIR:-${HOME}/data/backups/docker/mysql9}:/backup
#        labels:
#             ofelia.enabled: "true"
#             ofelia.job-exec.mysql9.command: "/bin/backup.sh"
#             ofelia.job-exec.mysql9.schedule: "${BACKUP_CRON_EXPRESSION:-0 9,15,17,21 * * *}"
        tty: true

networks:
    shared-network-internal:
        name: ${SHARED_NETWORK_INTERNAL_NAME:-shared-network-internal}
        external: true

volumes:
    shared-home:
        name: ${SHARED_HOME_VOLUME:-shared-home}
        external: true
    mysql9-data:
        name: mysql9-data
    mysql9-conf:
        name: mysql9-conf
